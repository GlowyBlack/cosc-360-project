# Browser navigations send Sec-Fetch-Dest: document; XHR/fetch typically do not.
# That lets the same path (e.g. /admin/users) serve the SPA for full page loads
# and proxy to Express for API calls.
map $http_sec_fetch_dest $bookbuddy_is_document_nav {
    document 1;
    default 0;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 12M;

    location /socket.io/ {
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location ~ ^/(admin|auth|books|comments|messages|posts|requests|reviews|reports|user)(/|$) {
        if ($bookbuddy_is_document_nav = 1) {
            rewrite ^ /index.html last;
        }
        proxy_pass http://server:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
